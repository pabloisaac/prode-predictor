<svg viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">

  <!-- Ball -->
  <g transform="translate(72, 80)">
    <!-- Glow -->
    <circle cx="0" cy="0" r="58" fill="#00E676" opacity="0.08"/>
    <!-- Shadow -->
    <ellipse cx="2" cy="56" rx="44" ry="7" fill="#000" opacity="0.25"/>
    <!-- Main ball -->
    <circle cx="0" cy="0" r="52" fill="#0d0d0d" stroke="#00E676" stroke-width="2.5"/>
    <!-- Classic soccer ball patches - black pentagons style -->
    <!-- Center pentagon -->
    <polygon points="0,-22 20.9,-7.2 12.9,18.8 -12.9,18.8 -20.9,-7.2" fill="#00E676" opacity="0.9"/>
    <!-- Top patch -->
    <polygon points="0,-52 14,-34 0,-26 -14,-34" fill="#1a1a1a" stroke="#00E676" stroke-width="1"/>
    <!-- Top right -->
    <polygon points="14,-34 38,-28 32,-10 12.9,18.8" fill="#1a1a1a" stroke="#00E676" stroke-width="1" opacity="0.7"/>
    <!-- Bottom right -->
    <polygon points="32,-10 50,10 40,34 12.9,18.8" fill="#1a1a1a" stroke="#00E676" stroke-width="1" opacity="0.5"/>
    <!-- Bottom -->
    <polygon points="40,34 20,52 -20,52 -40,34 -12.9,18.8 12.9,18.8" fill="#1a1a1a" stroke="#00E676" stroke-width="1" opacity="0.4"/>
    <!-- Bottom left -->
    <polygon points="-32,-10 -50,10 -40,34 -12.9,18.8" fill="#1a1a1a" stroke="#00E676" stroke-width="1" opacity="0.5"/>
    <!-- Top left -->
    <polygon points="-14,-34 -38,-28 -32,-10 -12.9,18.8" fill="#1a1a1a" stroke="#00E676" stroke-width="1" opacity="0.7"/>
    <!-- Shine -->
    <ellipse cx="-16" cy="-22" rx="10" ry="6" fill="white" opacity="0.12" transform="rotate(-30,-16,-22)"/>
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#333" stroke-width="1"/>
  </g>

  <!-- Text: PREDICTOR -->
  <text x="148" y="66" font-size="38" font-weight="900" letter-spacing="-1" fill="white">PREDICTOR</text>

  <!-- Text: MUNDIAL 2026 -->
  <text x="150" y="103" font-size="22" font-weight="700" letter-spacing="6" fill="#00E676">MUNDIAL 2026</text>

  <!-- Tagline -->
  <text x="150" y="126" font-size="11.5" font-weight="400" letter-spacing="1.5" fill="#555">Monte Carlo · Dixon-Coles · Claude AI</text>

  <!-- Accent line -->
  <rect x="150" y="136" width="280" height="2" rx="1" fill="#00E676" opacity="0.3"/>

</svg>
